<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Benzamin Yi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>

    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F4EFE4;
      --cream-mid:  #EDE6D5;
      --cream-dark: #E0D8C6;
      --ink:        #161412;
      --ink-soft:   #5A524A;
      --ink-muted:  #8C847A;
      --gold:       #B8892E;
      --gold-dk:    #9C7224;
      --serif:      'Playfair Display', Georgia, serif;
      --sans:       'DM Sans', system-ui, sans-serif;
      --pad:        clamp(24px, 5vw, 80px);
      --nav-h:      64px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      cursor: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Custom Cursor ─────────────────────────────── */
    #cursor-dot {
      position: fixed; width: 8px; height: 8px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: multiply;
    }
    #cursor-ring {
      position: fixed; width: 34px; height: 34px;
      border: 1.5px solid var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0.45;
      transition: width .22s ease, height .22s ease, opacity .22s ease;
    }
    body.cursor-hover #cursor-ring { width: 52px; height: 52px; opacity: 0.25; }

    /* ─── Nav ───────────────────────────────────────── */
    nav#main-nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); z-index: 200;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 var(--pad);
      background: rgba(244, 239, 228, 0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 var(--cream-dark);
    }
    .nav-logo {
      display: flex; align-items: center;
      text-decoration: none; color: var(--ink); flex-shrink: 0;
    }
    .nav-logo svg { display: block; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      font-size: 12px; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--ink-soft); transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    .nav-resume-btn {
      border: 1px solid var(--gold) !important;
      color: var(--gold) !important;
      padding: 6px 16px; border-radius: 3px;
      transition: background .2s, color .2s !important;
    }
    .nav-resume-btn:hover { background: var(--gold) !important; color: var(--cream) !important; }

    /* ─── Page layout ───────────────────────────────── */
    .contact-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: calc(var(--nav-h) + clamp(56px, 9vh, 108px)) var(--pad) clamp(56px, 9vh, 108px);
    }

    /* ─── Mark + heading area ───────────────────────── */
    .contact-mark {
      margin-bottom: 40px;
    }

    /* ─── Contact grid ──────────────────────────────── */
    .contact-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 6vw, 96px);
      align-items: start;
    }

    .section-eyebrow {
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .contact-heading {
      font-family: var(--serif);
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 900;
      letter-spacing: -0.035em;
      line-height: 1;
      margin-bottom: 16px;
    }

    .contact-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(15px, 1.8vw, 20px);
      color: var(--ink-soft);
    }

    .contact-right {
      display: flex;
      flex-direction: column;
      gap: 36px;
      padding-top: 8px;
    }

    .contact-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .contact-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .contact-value {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 24px);
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .contact-link {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 24px);
      color: var(--ink);
      text-decoration: none;
      transition: color .2s;
      display: inline-block;
    }
    .contact-link:hover { color: var(--gold); }

    .contact-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: clamp(48px, 7vh, 80px);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gold);
      border: 1.5px solid var(--gold);
      padding: 10px 24px;
      border-radius: 4px;
      transition: background .2s ease, color .2s ease;
      cursor: none;
    }
    .contact-back:hover { background: var(--gold); color: var(--cream); }

    /* ─── Footer ────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--cream-dark);
      padding: 28px var(--pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-copy {
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.06em;
    }

    /* ─── Animations ────────────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { opacity: 0; animation: riseIn .7s ease .1s forwards; }
    .anim-2 { opacity: 0; animation: riseIn .7s ease .25s forwards; }
    .anim-3 { opacity: 0; animation: riseIn .7s ease .4s forwards; }

    /* ─── Responsive ────────────────────────────────── */
    @media (max-width: 860px) {
      .contact-inner { grid-template-columns: 1fr; gap: 36px; }
      .nav-links li:not(:last-child) a:not(.nav-resume-btn) { display: none; }
    }
    @media (max-width: 540px) {
      .nav-links a:not(.nav-resume-btn) { display: none; }
    }

  </style>
</head>

  <script>
    /* ── Custom cursor ── */
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = -200, my = -200, rx = -200, ry = -200;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    });
    (function tickRing() {
      rx += (mx - rx) * 0.11; ry += (my - ry) * 0.11;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(tickRing);
    })();
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  </script>
