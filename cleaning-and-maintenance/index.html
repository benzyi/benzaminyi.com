  width: 1501px; display: block;

#sticky-hdr-hots { position: absolute; inset: 0; pointer-events: none; }

/* Screen body: content below the fixed header */
#scr-body { position: relative; overflow: hidden; }
#scr-img  {
  display: block;
  width: 1501px;        /* logical CSS width — browser uses full pixel density */
  image-rendering: -webkit-optimize-contrast;
}
#scr-hots {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; pointer-events: none;
}

.hs {

  cursor: pointer; -webkit-tap-highlight-color: transparent;
  /* Debug: outline: 1px solid rgba(255,0,0,0.3); background: rgba(0,100,255,0.04); */

#fade {
  position: fixed; inset: 0; background: #fff;
  z-index: 200; opacity: 0; pointer-events: none;

function reScale() {
  var scale = window.innerWidth / 1501;
  scaler.style.transform = 'scale(' + scale + ')';
  scroll.style.height    = (window.innerHeight / scale) + 'px';
}
window.addEventListener('resize', reScale);
reScale();

// ── Preload all images ────────────────────────────────────────────────────
function preloadAll(cb) {
  var keys = Object.keys(SCREENS);
  var done = 0;
  var bar  = document.getElementById('loading-bar');
  keys.forEach(function(k) {
    var img   = new Image();
    img.onload = img.onerror = function() {
      bar.style.width = (++done / keys.length * 100) + '%';
      if (done >= keys.length) cb();
    };
    img.src = SCREENS[k].img;
  });
}

// ── Show a screen ─────────────────────────────────────────────────────────
function showScreen(id) {
  var sc = SCREENS[id];
  if (!sc) { console.warn('Missing screen:', id); return; }
  var fh = sc.fh || 0;

  // Sticky header
  if (fh > 0) {
    stickyHdr.style.display = 'block';
    stickyHdr.style.height  = fh + 'px';
    stickyImg.src           = sc.img;
    stickyImg.style.height  = sc.h + 'px';
  } else {
    stickyHdr.style.display = 'none';
  }

  // Body: clips the header portion via negative marginTop + overflow hidden
  scrBody.style.height     = (sc.h - fh) + 'px';
  scrBody.style.background = '#' + (sc.bg || 'ffffff');
  scrImg.style.marginTop   = fh > 0 ? (-fh + 'px') : '0px';
  scrImg.style.height      = sc.h + 'px';
  scrImg.src               = sc.img;

  scroll.scrollTop = 0;
  buildHotspots(id, fh);
}

// ── Build hotspot layers ──────────────────────────────────────────────────
function buildHotspots(screenId, fh) {
  stickyHots.innerHTML = '';
  scrHots.innerHTML    = '';
  stickyHots.style.pointerEvents = 'none';

  var hs = HOTSPOTS[String(screenId)] || [];
  hs.forEach(function(h) {
    var isHover  = (h.ev === 8);
    var centerY  = h.y + h.h * 0.5;
    var inHeader = fh > 0 && centerY < fh;

    if (inHeader) {
      stickyHots.style.pointerEvents = 'all';
      stickyHots.appendChild(makeHot(h, isHover, 0));
    } else {
      scrHots.appendChild(makeHot(h, isHover, fh));
    }
  });
}

// ── Make a hotspot element ────────────────────────────────────────────────
function makeHot(h, isHover, yOff) {
  var d = document.createElement('div');
  d.className    = 'hs';
  d.style.left   = h.x + 'px';
  d.style.top    = (h.y - yOff) + 'px';
  d.style.width  = h.w + 'px';
  d.style.height = h.h + 'px';

  var target = h.target;
  if (isHover) {
    d.addEventListener('mouseenter', function() {
      var t = SCREENS[target];
      if (t) { scrImg.src = t.img; if (stickyImg.src) stickyImg.src = t.img; }
    });
    d.addEventListener('mouseleave', function() {
      var b = SCREENS[baseId];
      if (b) { scrImg.src = b.img; if (stickyImg.src) stickyImg.src = b.img; }
    });
  } else {
    d.addEventListener('click', function(e) {
      e.stopPropagation();
      navigate(target);
    });
  }
  return d;
}

// ── Navigate with a quick fade ────────────────────────────────────────────
function navigate(id) {
  if (!SCREENS[id]) return;
  fade.style.transition    = 'opacity 0.14s ease';
  fade.style.opacity       = '1';
  fade.style.pointerEvents = 'all';
  setTimeout(function() {
    baseId = id;
    showScreen(id);
    fade.style.transition    = 'opacity 0.3s ease';
    fade.style.opacity       = '0';
    fade.style.pointerEvents = 'none';
  }, 160);
}

// ── Boot ──────────────────────────────────────────────────────────────────
preloadAll(function() {
  baseId = INTRO;
  showScreen(INTRO);
  var ld = document.getElementById('loading');
  ld.style.opacity = '0';
  setTimeout(function() { ld.style.display = 'none'; }, 600);
});
</script>
